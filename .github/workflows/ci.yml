name: Multiplatform CI Pipeline

on:
  pull_request:
    branches: ["master"]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup-project
      - name: Run Android Lint
        run: ./gradlew :camera:lintRelease
      - name: Upload Lint Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: camera/build/reports/lint-results-release.html
      - name: Run Detekt
        run: ./gradlew :camera:detekt

  build-library-android:
    needs: static-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup-project
      - name: Build Library (Android)
        run: ./gradlew :camera:assembleDebug

  build-library-ios:
    needs: static-analysis
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup-project
      - name: Build Library (iOS)
        run: ./gradlew :camera:iosSimulatorArm64Binaries

  test-library-android:
    needs: build-library-android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup-project
      - name: Run Unit Tests (Android)
        run: ./gradlew :camera:testDebugUnitTest

  test-library-android-instrumented:
    needs: build-library-android
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api-level: [ 25, 30, 35 ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup-project

      - name: Get AVD info
        uses: ./.github/actions/get-avd-info
        id: avd-info
        with:
          api-level: ${{ matrix.api-level }}

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Instrumentation Tests (Android)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ steps.avd-info.outputs.arch }}
          target: ${{ steps.avd-info.outputs.target }}
          script: ./gradlew :camera:connectedDebugAndroidTest

  test-library-ios:
    needs: build-library-ios
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup-project
      - name: Run Tests (iOS)
        run: ./gradlew :camera:iosSimulatorArm64Test

  build-app-android:
    needs: build-library-android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup-project
      - name: Build App (Android)
        run: ./gradlew :demo:composeApp:assembleDebug

  build-app-ios:
    needs: build-library-ios
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup-project

      - name: Build App (Kotlin + Swift)
        run: |
          xcodebuild -project demo/iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build